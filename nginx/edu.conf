upstream edu_backend { server app:8080; }

server {
    listen 443 ssl http2;
    server_name api.edu.example.com;
    ssl_certificate /etc/nginx/certs/edu.crt;
    ssl_certificate_key /etc/nginx/certs/edu.key;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 静态资源
    location /static/ { root /var/www/edu; expires 30d; }

    # API 反向代理
    location /api/ {
        proxy_pass http://edu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 支付回调（无认证）
    location /api/v1/callback/ {
        proxy_pass http://edu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.edu.example.com;
    return 301 https://$host$request_uri;
}
