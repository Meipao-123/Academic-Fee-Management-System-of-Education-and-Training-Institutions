spring:
  datasource:
    url: jdbc:h2:mem:edu_dev;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop  # 开发环境自动创建表
    show-sql: true
  flyway:
    enabled: false  # 开发环境跳过 Flyway
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

jwt:
  secret: dev-secret-key-at-least-256-bits-long-for-hs256-algorithm-use-this-in-dev-only
  access-token-ttl: 7200
  refresh-token-ttl: 604800

logging:
  level:
    com.meipao.edu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
